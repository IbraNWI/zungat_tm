services:
  web:
    build: .
    container_name: zungat_tm_web

    volumes:
      - ./data:/app/data
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

    restart: always

    environment:
      TZ: ${TZ:-Europe/Moscow}
      DJANGO_SETTINGS_MODULE: zungat_tm.settings
      PYTHONUNBUFFERED: "1"
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER:-True}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-Europe/Moscow}
      DJANGO_SQLITE_PATH: ${DJANGO_SQLITE_PATH:-/app/data/db.sqlite3}
      DJANGO_STATIC_URL: ${DJANGO_STATIC_URL:-/static/}
      DJANGO_STATIC_ROOT: ${DJANGO_STATIC_ROOT:-/app/staticfiles}
      DJANGO_MEDIA_URL: ${DJANGO_MEDIA_URL:-/media/}
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-/app/media}
      DJANGO_RUN_MIGRATIONS: ${DJANGO_RUN_MIGRATIONS:-1}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      zungat_network:
        ipv4_address: ${APP_IPV4_ADDRESS:-192.168.10.10}

networks:
  zungat_network:
    driver: bridge
    name: zungat_network
    ipam:
      config:
        - subnet: ${APP_NETWORK_SUBNET:-192.168.10.0/24}

services:
  web:
    build: .
    container_name: zungat_tm_web

    volumes:
      - /var/www/zungat_tm:/app/staticfiles
      - ./data:/app/data

    restart: always

    environment:
      - DJANGO_SETTINGS_MODULE=zungat_tm.settings
      - PYTHONUNBUFFERED=1

    command: gunicorn --bind 0.0.0.0:8000 --workers 1 zungat_tm.wsgi:application

    networks:
      zungat_network:
        ipv4_address: 192.168.10.10

networks:
  zungat_network:
    driver: bridge
    name: 'zungat_network'
    ipam:
      config:
        - subnet: 192.168.10.0/24